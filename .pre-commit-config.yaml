repos:
  - repo: local
    hooks:
      - id: backend-lint
        name: Backend Lint
        entry: bash -c "cd backend && make lint"
        language: system
        files: ^backend/
        pass_filenames: false
      - id: backend-tests
        name: Backend Tests
        entry: bash -c "cd backend && make test"
        language: system
        files: ^backend/
        pass_filenames: false
      - id: cli-lint
        name: CLI Lint
        entry: bash -c "cd cli && make lint"
        language: system
        files: ^cli/
        pass_filenames: false
      - id: cli-tests
        name: CLI Tests
        entry: bash -c "cd cli && make test"
        language: system
        files: ^cli/
        pass_filenames: false
      - id: flutter-format
        name: Flutter Format
        # We use 'bash -c' to navigate into the subdir before running the command
        entry: bash -c "cd ui/tracker_ui && dart format . --set-exit-if-changed"
        language: system
        files: ^ui/tracker_ui/.*\.dart$
        pass_filenames: false
      - id: flutter-analyze
        name: Flutter Analyze
        entry: bash -c "cd ui/tracker_ui && flutter analyze"
        language: system
        files: ^ui/tracker_ui/
        pass_filenames: false
      - id: flutter-tests
        name: Flutter Tests
        entry: bash -c "cd ui/tracker_ui && flutter test"
        language: system
        files: ^ui/tracker_ui/
        pass_filenames: false
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks