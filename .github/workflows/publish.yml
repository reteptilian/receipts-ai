name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch: # Enable manual trigger.

jobs:
  build-and-publish:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ["backend", "cli"]
    permissions:
      id-token: write # Mandatory for OIDC.
      contents: read
    steps:
      - name: Checkout (official GitHub action)
        uses: actions/checkout@v6
        with:
          # Important for versioning plugins:
          fetch-depth: 0

      - name: Install uv (official Astral action)
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "${{ matrix.project }}/uv.lock"
          python-version: "3.12"

      - name: Set up Python (using uv)
        run: uv python install
        working-directory: ${{ matrix.project }}

      - name: Install all dependencies
        run: uv sync --all-extras
        working-directory: ${{ matrix.project }}

      - name: Run tests
        run: uv run pytest
        working-directory: ${{ matrix.project }}

      - name: Build package
        run: uv build
        working-directory: ${{ matrix.project }}

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
        working-directory: ${{ matrix.project }}
        # Although uv is newer and faster, the "official" publishing option is the one from PyPA,
        # which uses twine. If desired, replace `uv publish` with:
        # uses: pypa/gh-action-pypi-publish@release/v1
